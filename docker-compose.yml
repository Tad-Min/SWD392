version: '3.8'

services:
  # SQL Server Database
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: overlut-db
    user: root
    environment:
      SA_PASSWORD: "OverLut@2026"
      ACCEPT_EULA: "Y"
      MSSQL_PID: Express
    ports:
      - "1723:1433"
    volumes:
      - overlut-db-volume:/var/opt/mssql/data
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "SA", "-P", "OverLut@2026", "-Q", "SELECT 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 40s
    networks:
      - overlut-net

  # Database Initialization
  db-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      db:
        condition: service_started
    entrypoint: /bin/bash -c "\
      echo 'Waiting for SQL Server to be ready...'; sleep 60; \
      echo 'Attempting to connect...'; \
      until /opt/mssql-tools/bin/sqlcmd -S db -U SA -P OverLut@2026 -Q 'SELECT 1' 2>/dev/null; do \
        echo 'Retrying connection...'; sleep 5; \
      done; \
      echo 'SQL Server ready! Running OverLut.sql...'; \
      /opt/mssql-tools/bin/sqlcmd -S db -U SA -P OverLut@2026 -i /scripts/OverLut.sql; \
      echo 'Database initialization complete!'"
    volumes:
      - ./BEOverLut_MonoService/OverLut/OverLut.sql:/scripts/OverLut.sql:ro
    environment:
      SA_PASSWORD: "OverLut@2026"
    restart: "no"
    networks:
      - overlut-net

  # Backend API (.NET)
  webapi:
    build:
      context: ./BEOverLut_MonoService/OverLut
      dockerfile: WebApi/Dockerfile
    image: overlut-webapi:latest
    container_name: overlut-api
    depends_on:
      - db-init
    environment:
      # Cấu trúc: ConnectionStrings__<Tên_chuỗi_kết_nối_trong_appsettings>
      ConnectionStrings__overlutdb: "Server=db,1433;Database=OverLutDb;User Id=sa;Password=OverLut@2026;TrustServerCertificate=True;"
      ConnectionStrings__overlutstoragedb: "Server=db,1433;Database=OverLutDb_Storage;User Id=sa;Password=OverLut@2026;TrustServerCertificate=True;"
      ASPNETCORE_ENVIRONMENT: "Development" # Đổi thành Development để có thể xem Swagger qua Docker
      ASPNETCORE_URLS: "http://+:8080"
    ports:
      - "5000:8080"
    restart: always
    networks:
      - overlut-net

  # Frontend (React)
  frontend:
    build:
      context: ./FEOverLut/FEOVERLUT
      dockerfile: Dockerfile
      args: 
        - VITE_API_URL=http://localhost:5000/api # Thêm dòng này để Vite nhận API
    image: overlut-frontend:latest
    container_name: overlut-frontend
    depends_on:
      - webapi
    ports:
      - "3000:80"
    # Bạn có thể xóa phần environment: - VITE_API_URL đi vì nó không có tác dụng với Nginx
    restart: always
    networks:
      - overlut-net

  # Mobile Web (Flutter)
  mobile-web:
    build:
      context: ./FlutterOverLut/flutteroverlut
      dockerfile: Dockerfile
    image: overlut-mobile-web:latest
    container_name: overlut-mobile-web
    depends_on:
      - webapi
    ports:
      - "3001:80"
    restart: always
    networks:
      - overlut-net

  # ---------------- THÊM VÀO CHO AI ----------------

  # 1. Engine chạy mô hình AI
  ollama:
    image: ollama/ollama:latest
    container_name: overlut-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - overlut-net
    restart: always

  # 2. Tự động tải Llama3.2-3B khi khởi động lần đầu
  ollama-init:
    image: curlimages/curl:latest
    container_name: overlut-ollama-init
    depends_on:
      - ollama
    networks:
      - overlut-net
    command: >
      sh -c "
        echo 'Waiting for Ollama to start...'
        sleep 10
        echo 'Pulling llama3.2:3b model...'
        curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3.2:3b\"}'
        echo 'Model pulled successfully!'
      "

  # 3. Cổng trung gian API AI (Thư mục AIGateway chứa file main.py, requirements.txt)
  ai-gateway:
    build: 
      context: ./llama3-3b/AIGateway
      dockerfile: Dockerfile
    container_name: overlut-ai-gateway
    depends_on:
      - ollama
      - webapi
    ports:
      - "8000:8000"
    networks:
      - overlut-net
    restart: always

# ---------------- GOM CHUNG VOLUMES VÀ NETWORKS XUỐNG DƯỚI CÙNG ----------------

volumes:
  overlut-db-volume:
  ollama_data: 

networks:
  overlut-net:
    name: overlut-net