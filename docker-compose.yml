version: '3.8'

services:
  # SQL Server Database
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: overlut-db
    user: root
    environment:
      SA_PASSWORD: "OverLut@2026"
      ACCEPT_EULA: "Y"
      MSSQL_PID: Express
    ports:
      - "1723:1433"
    volumes:
      - overlut-db-volume:/var/opt/mssql/data
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools18/bin/sqlcmd", "-C", "-S", "localhost", "-U", "SA", "-P", "OverLut@2026", "-Q", "SELECT 1" ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 40s
    networks:
      - overlut-net

  # Database Initialization
  db-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      db:
        condition: service_healthy
    entrypoint: /bin/bash -c "\ echo 'Waiting for SQL Server to be ready...'; sleep 10; \ echo 'Attempting to connect...'; \ until /opt/mssql-tools/bin/sqlcmd -C -S db -U SA -P OverLut@2026 -Q 'SELECT 1' 2>/dev/null; do \ echo 'Retrying connection...'; sleep 5; \ done; \ echo 'SQL Server ready! Running OverlutAll.sql...'; \ /opt/mssql-tools/bin/sqlcmd -C -S db -U SA -P OverLut@2026 -i /scripts/OverlutAll.sql; \ echo 'Database initialization complete!'"
    volumes:
      - ./BEOverLut_MonoService/OverLut/OverlutAll.sql:/scripts/OverlutAll.sql:ro
    environment:
      SA_PASSWORD: "OverLut@2026"
    restart: "no"
    networks:
      - overlut-net

  # Backend API (.NET)
  webapi:
    image: tadminm/overlut:webapi
    container_name: overlut-api
    depends_on:
      - db-init
    environment:
      # Cấu trúc: ConnectionStrings__<Tên_chuỗi_kết_nối_trong_appsettings>
      ConnectionStrings__overlutdb: "Server=db,1433;Database=OverLutDb;User Id=sa;Password=OverLut@2026;TrustServerCertificate=True;"
      ConnectionStrings__overlutstoragedb: "Server=db,1433;Database=OverLutDb_Storage;User Id=sa;Password=OverLut@2026;TrustServerCertificate=True;"
      ASPNETCORE_ENVIRONMENT: "Development" # Đổi thành Development để có thể xem Swagger qua Docker
      ASPNETCORE_URLS: "http://+:8080"
    ports:
      - "5000:8080"
    restart: always
    networks:
      - overlut-net

  # Frontend (React)
  frontend:
    image: tadminm/overlut:frontend
    container_name: overlut-frontend
    depends_on:
      - webapi
    restart: always
    networks:
      - overlut-net

  # Reverse Proxy (Caddy)
  caddy:
    image: caddy:2-alpine
    container_name: overlut-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - webapi
      - ai-gateway
    networks:
      - overlut-net

  # ---------------- THÊM VÀO CHO AI ----------------

  # 1. Engine chạy mô hình AI
  ollama:
    image: ollama/ollama:latest
    container_name: overlut-ollama
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - overlut-net
    restart: always

  # 2. Tự động tải Llama3.2-3B khi khởi động lần đầu
  ollama-init:
    image: curlimages/curl:latest
    container_name: overlut-ollama-init
    depends_on:
      - ollama
    networks:
      - overlut-net
    command: >
      sh -c "
        echo 'Waiting for Ollama to start...'
        until curl -sf http://ollama:11434/api/tags > /dev/null 2>&1; do
          echo 'Ollama not ready, retrying in 5s...'
          sleep 5
        done
        echo 'Ollama is ready! Pulling qwen2.5:1.5b model...'
        curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"qwen2.5:1.5b\"}'
        echo 'Model pulled successfully!'
      "
  ai-gateway:
    image: tadminm/overlut:ai-gateway
    container_name: overlut-ai-gateway
    depends_on:
      - ollama
      - webapi
    environment:
      OVERLUT_BACKEND_URL: "http://webapi:8080"
      OVERLUT_OLLAMA_HOST: "http://ollama:11434"
    ports:
      - "8000:8000"
    networks:
      - overlut-net
    restart: always

  # Tự động cập nhật CD (Continuous Deployment)
  watchtower:
    image: containrrr/watchtower
    container_name: overlut-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 overlut-api overlut-frontend overlut-ai-gateway
    restart: always
    networks:
      - overlut-net

# ---------------- GOM CHUNG VOLUMES VÀ NETWORKS XUỐNG DƯỚI CÙNG ----------------

volumes:
  overlut-db-volume:
  ollama_data:
  caddy_data:
  caddy_config:


networks:
  overlut-net:
    name: overlut-net
