name: flutteroverlut
description: "OverLut — Hệ thống Điều phối Cứu trợ Lũ lụt (Mobile)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.7.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Model serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI enhancements
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1

  # Location / GPS
  geolocator: ^13.0.2
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
